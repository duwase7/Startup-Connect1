# Nginx Load Balancer Configuration for Startup Connect
# Place this on Lb01 at: /etc/nginx/sites-available/startup-connect

upstream startup_connect_backend {
    # Round-robin load balancing (default)
    server web01_IP:80;   # Replace with your Web01 IP
    server web02_IP:80;   # Replace with your Web02 IP

    # Health checks — mark server down after 2 failures, try for 30s
    # (requires nginx Plus for active checks; passive below)
    # server web01_IP:80 max_fails=2 fail_timeout=30s;
    # server web02_IP:80 max_fails=2 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;  # Replace with your load balancer's domain or IP

    location / {
        proxy_pass http://startup_connect_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}